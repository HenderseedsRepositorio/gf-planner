:root{

  --green:#2D7A4F;--amber:#B8860B;--red:#A63D40;--blue:#3A6EA5;
  --radius:14px;
}
*{box-sizing:border-box;margin:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Figtree',sans-serif;background:var(--sand);color:var(--ink);overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:9px}

/* Grain */
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:128px}

h1,h2,h3{font-family:'Playfair Display',serif}
button{cursor:pointer;border:none;font-family:inherit}
input,textarea,select{font-family:inherit}

/* Layout */
.shell{max-width:1100px;margin:0 auto;padding:0 24px}

/* Nav */
.topbar{position:sticky;top:0;z-index:50;background:rgba(217,209,191,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(61,74,24,.06);padding:14px 0}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat-card{background:var(--cream);border-radius:16px;padding:20px 24px;border:1px solid rgba(0,0,0,.04);transition:all .3s ease;position:relative;overflow:hidden}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.04)}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.stat-card:nth-child(1)::after{background:var(--olive)}.stat-card:nth-child(2)::after{background:var(--blue)}
.stat-card:nth-child(3)::after{background:var(--amber)}.stat-card:nth-child(4)::after{background:var(--red)}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:16px}
.stat-num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;line-height:1}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-top:4px;font-weight:500}

/* Progress bar */
.progress-track{height:6px;background:rgba(0,0,0,.04);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.22,1,.36,1);background:linear-gradient(90deg,var(--olive),var(--olive-dk))}

/* Pipeline */
.pipeline{display:flex;gap:4px;margin-bottom:28px;overflow-x:auto;padding:2px 0;scrollbar-width:none;-ms-overflow-style:none}
.pipeline::-webkit-scrollbar{display:none}
.pipe-step{flex:1;min-width:120px;background:var(--cream);border-radius:12px;padding:12px 14px;border:1px solid rgba(0,0,0,.04);text-align:center;cursor:pointer;transition:all .25s ease;position:relative}
.pipe-step:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.04)}
.pipe-step .pipe-emoji{font-size:18px;margin-bottom:4px}
.pipe-step .pipe-name{font-size:11px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pipe-step .pipe-pct{font-size:18px;font-weight:700;font-family:'Playfair Display',serif;margin-top:2px}
.pipe-step .pipe-bar{height:3px;border-radius:99px;background:rgba(0,0,0,.04);margin-top:8px;overflow:hidden}
.pipe-step .pipe-bar-fill{height:100%;border-radius:99px;transition:width .6s ease}

/* Stage */
.stage{background:var(--cream);border-radius:20px;border:1px solid rgba(0,0,0,.04);overflow:hidden;transition:all .3s ease}
.stage-header{padding:20px 24px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;user-select:none}
.stage-header:hover{background:rgba(94,107,46,.02)}
.stage-body{padding:0 24px 20px}
.stage-badge{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:99px}
.chevron{transition:transform .3s ease;color:var(--muted)}
.chevron.open{transform:rotate(180deg)}

/* Task row */
.task{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:12px;transition:all .25s ease;position:relative;border-left:3px solid transparent}
.task:hover{background:rgba(94,107,46,.03)}
.task.done{opacity:.45}
.task.done .task-name{text-decoration:line-through}
.task.pri-alta-border{border-left-color:var(--red)}
.task.pri-media-border{border-left-color:var(--amber)}
.task.pri-baja-border{border-left-color:rgba(0,0,0,.08)}

/* Task complete animation */
.task.just-done{animation:taskDone .4s ease}
@keyframes taskDone{0%{background:rgba(45,122,79,.08)}100%{background:transparent}}

/* Checkbox */
.chk{width:20px;height:20px;border-radius:6px;border:2px solid rgba(0,0,0,.12);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s ease;margin-top:1px}
.chk:hover{border-color:var(--olive);transform:scale(1.1)}
.chk.checked{background:var(--olive);border-color:var(--olive)}
.chk.checked svg{opacity:1}
.chk svg{opacity:0;transition:opacity .15s}

.task-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.4}
.task-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
.task-note{font-size:12px;color:var(--muted);font-weight:300;line-height:1.4}
.task-due{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;white-space:nowrap}
.task-due.overdue{background:rgba(166,61,64,.08);color:var(--red)}
.task-due.soon{background:rgba(184,134,11,.08);color:var(--amber)}
.task-due.ok{background:rgba(45,122,79,.06);color:var(--green)}

/* Priority dots */
.pri{width:8px;height:8px;border-radius:99px;flex-shrink:0;margin-top:7px}
.pri-alta{background:var(--red)}
.pri-media{background:var(--amber)}
.pri-baja{background:rgba(0,0,0,.12)}

/* Task actions */
.task-actions{display:flex;gap:4px;opacity:0;transition:opacity .2s;flex-shrink:0}
.task:hover .task-actions{opacity:1}

/* Buttons */
.btn{font-size:13px;font-weight:500;padding:8px 16px;border-radius:10px;transition:all .25s ease;display:inline-flex;align-items:center;gap:6px}
.btn-olive{background:var(--olive-dk);color:#fff}
.btn-olive:hover{background:var(--olive);transform:translateY(-1px)}
.btn-ghost{background:rgba(94,107,46,.06);color:var(--olive-dk)}
.btn-ghost:hover{background:rgba(94,107,46,.12)}
.btn-danger{background:rgba(166,61,64,.08);color:var(--red)}
.btn-danger:hover{background:rgba(166,61,64,.15)}
.btn-sm{padding:4px 8px;font-size:11px}

/* Modal */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(28,26,20,.4);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal{background:var(--cream);border-radius:24px;padding:32px;max-width:500px;width:100%;box-shadow:0 32px 80px rgba(0,0,0,.12);animation:slideUp .3s cubic-bezier(.22,1,.36,1)}
.modal label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);display:block;margin-bottom:6px}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 14px;border:1.5px solid rgba(0,0,0,.08);border-radius:10px;font-size:14px;background:rgba(255,255,255,.6);color:var(--ink);transition:border-color .2s}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(94,107,46,.08)}
.modal textarea{resize:vertical;min-height:60px}
.modal select{appearance:none;cursor:pointer}

/* Blocker */
.blocker{background:rgba(166,61,64,.04);border:1px solid rgba(166,61,64,.1);border-radius:16px;padding:16px 20px;transition:all .25s ease}
.blocker:hover{border-color:rgba(166,61,64,.2)}

/* Filter pills */
.pill{font-size:12px;font-weight:500;padding:6px 14px;border-radius:99px;transition:all .2s ease;border:1px solid transparent;background:rgba(94,107,46,.04)}
.pill:hover{background:rgba(94,107,46,.1)}
.pill.active{background:var(--olive-dk);color:#fff}

/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.toolbar-left{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.toolbar-right{display:flex;gap:8px;align-items:center}

/* Search */
.search-box{position:relative}
.search-box input{padding:8px 14px 8px 36px;border:1.5px solid rgba(0,0,0,.06);border-radius:10px;font-size:13px;background:var(--cream);width:220px;color:var(--ink);outline:none;transition:all .2s}
.search-box input:focus{border-color:var(--olive);width:260px;box-shadow:0 0 0 3px rgba(94,107,46,.06)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%)}

/* Footer */
.footer{text-align:center;padding:40px 0 20px;color:var(--muted);font-size:12px;font-weight:300}
.footer a{color:var(--olive-dk);text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}

/* Section title */
.section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.15em;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* Responsive */
@media(max-width:768px){
  .stats-grid{grid-template-columns:repeat(2,1fr)!important}
  .pipeline{gap:6px}
  .pipe-step{min-width:90px;padding:10px}
  .task{padding:10px 12px}
  .task-actions{opacity:1!important}
  .modal{padding:24px}
  .search-box input{width:160px}
  .search-box input:focus{width:200px}
  .toolbar{gap:10px}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr 1fr!important}
  .stat-card{padding:16px}
  .stat-num{font-size:1.8rem}
  .topbar .shell{flex-direction:column;gap:8px;align-items:flex-start!important}
}

/* Sync indicator */
.sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:99px;transition:all .3s ease}
.sync-badge .dot{width:7px;height:7px;border-radius:99px;flex-shrink:0}
.sync-online .dot{background:var(--green)}
.sync-online{background:rgba(45,122,79,.08);color:var(--green)}
.sync-offline .dot{background:var(--muted)}
.sync-offline{background:rgba(0,0,0,.05);color:var(--muted)}
.sync-saving .dot{background:var(--amber);animation:pulse 1s infinite}
.sync-saving{background:rgba(184,134,11,.08);color:var(--amber)}
.sync-error .dot{background:var(--red)}
.sync-error{background:rgba(166,61,64,.08);color:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Print */
@media print{
  .topbar,.toolbar,.task-actions,button{display:none!important}
  .stage-body{display:block!important}
  body{background:#fff}
  .stat-card,.stage,.blocker{break-inside:avoid}
}
</style>

// ═══ Data ═══
function migrateData(parsed){
  if(!parsed || !parsed.stages) return JSON.parse(JSON.stringify(DEFAULT_DATA));
  parsed.stages.forEach(s => s.tasks.forEach(t => { if(t.due === undefined) t.due = ""; }));
  return parsed;
}

function loadLocal(){
  try{
    const d = localStorage.getItem(STORAGE_KEY);
    if(!d) return JSON.parse(JSON.stringify(DEFAULT_DATA));
    return migrateData(JSON.parse(d));
  } catch(e){ return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}

function saveLocal(d){ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

// Save to Supabase with debounce (300ms)
function saveData(d){
  saveLocal(d);
  if(!sb) return;
  clearTimeout(saveTimeout);
  syncStatus = "saving"; renderSyncBadge();
  saveTimeout = setTimeout(async ()=>{
    try {
      const { error } = await sb.from("planner").upsert({ id:1, data:d });
      if(error) throw error;
      syncStatus = "online";
    } catch(e){
      console.error("Sync save error:", e);
      syncStatus = "error";
    }
    renderSyncBadge();
  }, 300);
}

// Load from Supabase (called once on init)
async function loadRemote(){
  if(!sb){ syncStatus = "offline"; return null; }
  try {
    const { data, error } = await sb.from("planner").select("data, updated_at").eq("id", 1).single();
    if(error) throw error;
    if(!data || !data.data || !data.data.stages) return null;
    syncStatus = "online";
    return migrateData(data.data);
  } catch(e){
    console.error("Sync load error:", e);
    syncStatus = "error";
    return null;
  }
}

// Sync badge updater (without full re-render)
function renderSyncBadge(){
  const el = document.getElementById("sync-badge");
  if(!el) return;
  const labels = { online:"Sincronizado", offline:"Offline", saving:"Guardando...", error:"Error sync" };
  el.className = `sync-badge sync-${syncStatus}`;
  el.innerHTML = `<span class="dot"></span>${labels[syncStatus]}`;
}

// ═══ Helpers ═══
function stats(){
  let total=0, done=0, alta=0, altaDone=0;
  DATA.stages.forEach(s=>s.tasks.forEach(t=>{
    total++; if(t.done) done++;
    if(t.pri==="alta"){alta++; if(t.done) altaDone++;}
  }));
  return {total, done, pct:total?Math.round(done/total*100):0, alta, altaDone, pending:total-done};
}

function filteredTasks(tasks){
  let list = tasks;
  if(filter==="pendientes") list = list.filter(t=>!t.done);
  if(filter==="completadas") list = list.filter(t=>t.done);
  if(searchQuery) list = list.filter(t=>
    t.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
    (t.note||"").toLowerCase().includes(searchQuery.toLowerCase())
  );
  return list;
}

function dueStatus(due){
  if(!due) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(due + "T00:00:00"); d.setHours(0,0,0,0);
  const diff = Math.ceil((d - today) / 86400000);
  if(diff < 0) return "overdue";
  if(diff <= 7) return "soon";
  return "ok";
}

function formatDate(due){
  if(!due) return "";
  const d = new Date(due + "T00:00:00");
  const months = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

function todayStr(){
  const d = new Date();
  const dias = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]}, ${d.getFullYear()}`;
}

function stageStats(stage){
  const done = stage.tasks.filter(t=>t.done).length;
  const total = stage.tasks.length;
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}

// ═══ Actions ═══

function toggleTask(stageId, taskId){
  const stage = DATA.stages.find(s=>s.id===stageId);
  const task = stage?.tasks.find(t=>t.id===taskId);
  if(!task) return;
  task.done = !task.done;
  saveData(DATA);
  render();
  // Animation
  if(task.done){
    const el = document.querySelector(`#stage-${stageId} .task.done:not(.just-done)`);
    if(el){ el.classList.add('just-done'); setTimeout(()=>el.classList.remove('just-done'), 500); }
  }
}

function toggleBlocker(id){
  const b = DATA.blockers.find(x=>x.id===id);
  if(b){ b.resolved = !b.resolved; saveData(DATA); render(); }
}

function toggleStage(id){
  if(openStages.has(id)) openStages.delete(id); else openStages.add(id);
  render();
}

function toggleAllStages(){
  if(openStages.size > 0){
    openStages.clear();
  } else {
    DATA.stages.forEach(s => openStages.add(s.id));
  }
  render();
}

function scrollToStage(id){
  if(!openStages.has(id)) openStages.add(id);
  render();
  setTimeout(()=>{
    document.getElementById("stage-" + id)?.scrollIntoView({behavior:"smooth", block:"start"});
  }, 50);
}

function setFilter(f){ filter=f; render(); }
function setSearch(q){ searchQuery=q; render(); }

function deleteTask(stageId, taskId){
  if(!confirm("¿Eliminar esta tarea?")) return;
  const stage = DATA.stages.find(s=>s.id===stageId);
  if(stage){ stage.tasks = stage.tasks.filter(t=>t.id!==taskId); saveData(DATA); render(); }
}

function editTask(stageId, taskId){
  const stage = DATA.stages.find(s=>s.id===stageId);
  const task = stage?.tasks.find(t=>t.id===taskId);
  if(task){ editingTask = {stageId, task:{...task}}; renderModal(); }
}

function addStage(){
  const name = prompt("Nombre de la nueva etapa:");
  if(!name) return;
  DATA.stages.push({id:"s"+Date.now(), name, emoji:"📌", color:"var(--olive)", tasks:[]});
  saveData(DATA); render();
}

function resetData(){
  if(!confirm("¿Resetear todas las tareas a los valores iniciales? Se perderán los cambios.")) return;
  DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveData(DATA); render();
}

// Force pull from Supabase
async function forceSync(){
  const remote = await loadRemote();
  if(remote){
    DATA = remote;
    saveLocal(DATA);
    render();
    renderSyncBadge();
  }
}

function exportData(){
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `gf-studio-plan-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ═══ Modal ═══

function renderModal(){
  document.getElementById("modal-root")?.remove();
  if(!editingTask && !addingTo) return;

  const isEdit = !!editingTask;
  const task = isEdit ? editingTask.task : {name:"", pri:"media", note:"", done:false, due:""};

  const div = document.createElement("div");
  div.id = "modal-root";
  div.innerHTML = `
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h2 style="font-size:20px;font-weight:700;margin-bottom:20px;color:var(--ink)">${isEdit?"Editar tarea":"Nueva tarea"}</h2>
      <div style="display:grid;gap:14px">
        <div>
          <label>Tarea</label>
          <input id="m-name" type="text" value="${task.name.replace(/"/g,'&quot;')}" placeholder="Nombre de la tarea">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <label>Prioridad</label>
            <select id="m-pri">
              <option value="alta" ${task.pri==="alta"?"selected":""}>🔴 Alta</option>
              <option value="media" ${task.pri==="media"?"selected":""}>🟡 Media</option>
              <option value="baja" ${task.pri==="baja"?"selected":""}>⚪ Baja</option>
            </select>
          </div>
          <div>
            <label>Fecha límite</label>
            <input id="m-due" type="date" value="${task.due||''}">
          </div>
        </div>
        <div>
          <label>Notas</label>
          <textarea id="m-note" placeholder="Notas opcionales...">${task.note||""}</textarea>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:24px">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        ${isEdit?`<button class="btn btn-danger" onclick="deleteFromModal()">Eliminar</button>`:''}
        <button class="btn btn-olive" onclick="saveModal()">Guardar</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(div);
  document.getElementById("m-name").focus();
}

function closeModal(){
  editingTask = null; addingTo = null;
  document.getElementById("modal-root")?.remove();
}

function saveModal(){
  const name = document.getElementById("m-name").value.trim();
  if(!name){ alert("El nombre es obligatorio"); return; }
  const pri = document.getElementById("m-pri").value;
  const note = document.getElementById("m-note").value.trim();
  const due = document.getElementById("m-due").value || "";

  if(editingTask){
    const stage = DATA.stages.find(s=>s.id===editingTask.stageId);
    const task = stage?.tasks.find(t=>t.id===editingTask.task.id);
    if(task){ task.name=name; task.pri=pri; task.note=note; task.due=due; }
  } else if(addingTo){
    const stage = DATA.stages.find(s=>s.id===addingTo);
    if(stage){ stage.tasks.push({id:Date.now(), name, pri, note, done:false, due}); }
  }
  saveData(DATA); closeModal(); render();
}

function deleteFromModal(){
  if(!editingTask) return;
  if(!confirm("¿Eliminar esta tarea?")) return;
  const stage = DATA.stages.find(s=>s.id===editingTask.stageId);
  if(stage){ stage.tasks = stage.tasks.filter(t=>t.id!==editingTask.task.id); }
  saveData(DATA); closeModal(); render();
}

// ═══ Keyboard ═══
document.addEventListener("keydown", e => {
  if(e.key === "Escape") closeModal();
});

// ═══ Auto-sync on tab focus ═══
document.addEventListener("visibilitychange", ()=>{
  if(!document.hidden) forceSync();
});

// ═══ Init ═══
// Render immediately with local data, then sync from Supabase
render();

(async ()=>{
  const remote = await loadRemote();
  if(remote){
    // Use remote data (it's the source of truth)
    DATA = remote;
    saveLocal(DATA);
    openStages = new Set(DATA.stages.map(s=>s.id));
    render();
  } else if(syncStatus !== "error"){
    // First time: push local data to Supabase
    if(sb) saveData(DATA);
  }
  renderSyncBadge();
})();
</script>
