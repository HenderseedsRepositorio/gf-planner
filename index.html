<style>
:root{
  --olive:#5E6B2E;--olive-dk:#3D4A18;--sand:#D9D1BF;--sand-lt:#E8E2D4;
  --sage:#C8C4A8;--ink:#1C1A14;--muted:#5C5840;--cream:#FEFDF8;
  --green:#2D7A4F;--amber:#B8860B;--red:#A63D40;--blue:#3A6EA5;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Figtree',sans-serif;background:var(--sand);color:var(--ink);overflow-x:hidden;padding-bottom:calc(80px + var(--safe-b))}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);border-radius:9px}
h1,h2,h3{font-family:'Playfair Display',serif}
button{cursor:pointer;border:none;font-family:inherit;-webkit-tap-highlight-color:transparent}
input,textarea,select{font-family:inherit;font-size:16px!important}

/* Grain */
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.018;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:128px}

.shell{max-width:680px;margin:0 auto;padding:0 16px}

/* ─── Topbar ─── */
.topbar{position:sticky;top:0;z-index:50;background:rgba(217,209,191,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(61,74,24,.06);padding:12px 0}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{width:34px;height:34px;background:var(--olive-dk);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-info h1{font-size:16px;font-weight:700;line-height:1.2}
.topbar-info p{font-size:10px;color:var(--muted);font-weight:400;text-transform:capitalize}
.topbar-actions{display:flex;gap:6px;align-items:center}

/* Sync dot (compact) */
.sync-dot{width:8px;height:8px;border-radius:99px;flex-shrink:0;transition:background .3s}
.sync-dot.online{background:var(--green)}
.sync-dot.offline{background:var(--muted)}
.sync-dot.saving{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}

/* Icon button */
.icon-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(94,107,46,.06);color:var(--olive-dk);transition:all .2s;flex-shrink:0}
.icon-btn:hover,.icon-btn:active{background:rgba(94,107,46,.14)}

/* ─── Stats strip ─── */
.stats-strip{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding:20px 0 16px;margin:0 -16px;padding-left:16px;padding-right:16px}
.stats-strip::-webkit-scrollbar{display:none}
.stat-chip{background:var(--cream);border-radius:12px;padding:12px 16px;border:1px solid rgba(0,0,0,.04);min-width:0;flex-shrink:0;display:flex;align-items:center;gap:10px}
.stat-chip-num{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;line-height:1}
.stat-chip-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:500;white-space:nowrap}
.stat-chip-bar{width:60px}

/* Progress bar */
.progress-track{height:5px;background:rgba(0,0,0,.04);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.22,1,.36,1);background:linear-gradient(90deg,var(--olive),var(--olive-dk))}

/* ─── Blockers ─── */
.blockers-section{margin-bottom:20px}
.blocker{background:rgba(166,61,64,.04);border:1px solid rgba(166,61,64,.1);border-radius:14px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;transition:all .2s}
.blocker:active{background:rgba(166,61,64,.07)}

/* ─── Toolbar ─── */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding:2px 0}
.toolbar::-webkit-scrollbar{display:none}
.pill{font-size:12px;font-weight:500;padding:7px 14px;border-radius:99px;transition:all .2s;background:rgba(94,107,46,.05);white-space:nowrap;flex-shrink:0}
.pill:active{transform:scale(.95)}
.pill.active{background:var(--olive-dk);color:#fff}
.search-toggle{margin-left:auto}
.search-bar{margin-bottom:16px;position:relative;display:none}
.search-bar.open{display:block}
.search-bar input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid rgba(0,0,0,.06);border-radius:12px;font-size:14px!important;background:var(--cream);color:var(--ink);outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:var(--olive);box-shadow:0 0 0 3px rgba(94,107,46,.06)}
.search-bar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%)}

/* ─── Stage ─── */
.stage{background:var(--cream);border-radius:16px;border:1px solid rgba(0,0,0,.04);overflow:hidden;margin-bottom:12px}
.stage-header{padding:16px;cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none;-webkit-user-select:none;min-height:56px}
.stage-header:active{background:rgba(94,107,46,.02)}
.stage-emoji{font-size:20px;flex-shrink:0}
.stage-info{flex:1;min-width:0}
.stage-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stage-name{font-size:15px;font-weight:600}
.stage-badge{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:99px}
.stage-progress{margin-top:6px;max-width:160px}
.stage-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.chevron{transition:transform .3s;color:var(--muted);width:20px;height:20px}
.chevron.open{transform:rotate(180deg)}
.stage-body{padding:0 12px 14px}

/* Stage context menu */
.stage-menu{position:absolute;right:12px;top:100%;background:var(--cream);border:1px solid rgba(0,0,0,.08);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.1);z-index:60;min-width:180px;padding:6px;animation:popIn .15s ease}
.stage-menu-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:500;width:100%;text-align:left;background:none;color:var(--ink);transition:background .15s}
.stage-menu-item:active{background:rgba(0,0,0,.04)}
.stage-menu-item.danger{color:var(--red)}

/* ─── Task ─── */
.task{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:12px;transition:all .2s;border-left:3px solid transparent;cursor:pointer;min-height:48px}
.task:active{background:rgba(94,107,46,.04)}
.task.done{opacity:.4}
.task.done .task-name{text-decoration:line-through}
.task.pri-alta-border{border-left-color:var(--red)}
.task.pri-media-border{border-left-color:var(--amber)}
.task.pri-baja-border{border-left-color:rgba(0,0,0,.06)}
.task.just-done{animation:taskDone .5s ease}
@keyframes taskDone{0%{background:rgba(45,122,79,.1)}100%{background:transparent}}

/* Checkbox — bigger for touch */
.chk{width:26px;height:26px;border-radius:8px;border:2px solid rgba(0,0,0,.12);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:0}
.chk:active{transform:scale(.9)}
.chk.checked{background:var(--olive);border-color:var(--olive)}
.chk.checked svg{opacity:1}
.chk svg{opacity:0;transition:opacity .15s}

.task-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.35}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap}
.task-note{font-size:11.5px;color:var(--muted);font-weight:300;line-height:1.3}
.task-due{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;white-space:nowrap}
.task-due.overdue{background:rgba(166,61,64,.1);color:var(--red)}
.task-due.soon{background:rgba(184,134,11,.1);color:var(--amber)}
.task-due.ok{background:rgba(45,122,79,.07);color:var(--green)}

/* ─── Section title ─── */
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.15em;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* ─── Bottom sheet modal ─── */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(28,26,20,.35);backdrop-filter:blur(6px);animation:fadeIn .2s ease}
.modal-sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:var(--cream);border-radius:16px 16px 0 0;padding:12px 16px calc(12px + var(--safe-b));max-height:90vh;overflow-y:auto;animation:sheetUp .3s cubic-bezier(.22,1,.36,1);box-shadow:0 -8px 40px rgba(0,0,0,.1)}
.modal-sheet .handle{width:32px;height:3px;border-radius:99px;background:rgba(0,0,0,.1);margin:0 auto 8px}
.modal-sheet .sheet-title{font-size:15px;font-weight:700;margin-bottom:10px}
.modal-sheet label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);display:block;margin-bottom:3px}
.modal-sheet input,.modal-sheet textarea,.modal-sheet select{width:100%;padding:8px 10px;border:1.5px solid rgba(0,0,0,.08);border-radius:10px;font-size:15px!important;background:rgba(255,255,255,.6);color:var(--ink);transition:border-color .2s}
.modal-sheet input:focus,.modal-sheet textarea:focus,.modal-sheet select:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 2px rgba(94,107,46,.08)}
.modal-sheet textarea{resize:none;min-height:40px;max-height:60px}
.modal-sheet select{appearance:none;cursor:pointer}
.sheet-grid{display:grid;gap:8px}
.sheet-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sheet-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sheet-actions{display:flex;gap:6px;margin-top:10px}
.sheet-actions .btn{flex:1;padding:10px;font-size:13px;font-weight:600;border-radius:10px;justify-content:center}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
@keyframes sheetDown{from{transform:none}to{transform:translateY(100%)}}

/* ─── Confirm dialog ─── */
.confirm-bg{position:fixed;inset:0;z-index:200;background:rgba(28,26,20,.4);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .15s ease}
.confirm-box{background:var(--cream);border-radius:20px;padding:24px;max-width:320px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.12);animation:popIn .2s ease;text-align:center}
.confirm-box h3{font-size:17px;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.4}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600}

/* ─── Buttons ─── */
.btn{font-size:13px;font-weight:500;padding:8px 16px;border-radius:10px;transition:all .2s;display:inline-flex;align-items:center;gap:6px;justify-content:center}
.btn-olive{background:var(--olive-dk);color:#fff}
.btn-olive:active{background:var(--olive)}
.btn-ghost{background:rgba(94,107,46,.06);color:var(--olive-dk)}
.btn-ghost:active{background:rgba(94,107,46,.14)}
.btn-danger{background:rgba(166,61,64,.08);color:var(--red)}
.btn-danger:active{background:rgba(166,61,64,.18)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-full{width:100%;padding:14px;font-size:15px;font-weight:600;border-radius:14px}

/* ─── FAB ─── */
.fab{position:fixed;bottom:calc(20px + var(--safe-b));right:20px;width:54px;height:54px;border-radius:16px;background:var(--olive-dk);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(61,74,24,.3);z-index:40;transition:all .2s;font-size:24px}
.fab:active{transform:scale(.92);background:var(--olive)}

/* ─── Overflow menu ─── */
.overflow-menu{position:fixed;top:0;right:0;bottom:0;width:260px;background:var(--cream);z-index:80;box-shadow:-8px 0 40px rgba(0,0,0,.1);padding:20px;animation:slideIn .25s ease;display:flex;flex-direction:column;gap:4px}
.overflow-bg{position:fixed;inset:0;z-index:79;background:rgba(0,0,0,.2);animation:fadeIn .2s}
.overflow-item{display:flex;align-items:center;gap:10px;padding:14px 12px;border-radius:12px;font-size:14px;font-weight:500;background:none;color:var(--ink);width:100%;text-align:left;transition:background .15s}
.overflow-item:active{background:rgba(0,0,0,.04)}
.overflow-item svg{flex-shrink:0;color:var(--muted)}
.overflow-header{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;padding:16px 12px 6px;font-weight:600}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:none}}

/* ─── Footer ─── */
.footer{text-align:center;padding:24px 0 8px;color:var(--muted);font-size:11px;font-weight:300}

/* ─── Pipeline (desktop only) ─── */
.pipeline{display:none;gap:4px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.pipeline::-webkit-scrollbar{display:none}
.pipe-step{flex:1;min-width:100px;background:var(--cream);border-radius:10px;padding:10px;border:1px solid rgba(0,0,0,.04);text-align:center;cursor:pointer;transition:all .2s}
.pipe-step:active{transform:scale(.97)}
.pipe-step .pipe-emoji{font-size:16px}
.pipe-step .pipe-name{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.pipe-step .pipe-pct{font-size:15px;font-weight:700;font-family:'Playfair Display',serif;margin-top:1px}
.pipe-bar{height:3px;border-radius:99px;background:rgba(0,0,0,.04);margin-top:6px;overflow:hidden}
.pipe-bar-fill{height:100%;border-radius:99px;transition:width .6s}

/* ─── Animations ─── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}

/* ─── Desktop ─── */
@media(min-width:768px){
  .shell{padding:0 24px;max-width:800px}
  body{padding-bottom:40px}
  .pipeline{display:flex}
  .fab{bottom:32px;right:32px;width:56px;height:56px;border-radius:16px}
  .stat-chip-num{font-size:1.7rem}
  .stage-header{padding:18px 20px}
  .stage-body{padding:0 16px 16px}
  .task{padding:10px 14px;cursor:default}
  .modal-sheet{left:50%;right:auto;transform:translateX(-50%);max-width:480px;border-radius:20px;bottom:auto;top:50%;animation:modalCenter .3s cubic-bezier(.22,1,.36,1);max-height:80vh}
  @keyframes modalCenter{from{opacity:0;transform:translateX(-50%) translateY(-40%)}to{opacity:1;transform:translateX(-50%) translateY(-50%)}}
  .modal-sheet{transform:translateX(-50%) translateY(-50%)}
}

/* ─── Print ─── */
@media print{
  .topbar,.toolbar,.fab,.task-actions,button{display:none!important}
  .stage-body{display:block!important}
  body{background:#fff;padding-bottom:0}
  .stat-chip,.stage,.blocker{break-inside:avoid}
}
</style>

// ═══ Data Layer ═══
function migrateData(p){
  if(!p||!p.stages) return JSON.parse(JSON.stringify(DEFAULT_DATA));
  p.stages.forEach(s=>s.tasks.forEach(t=>{ if(t.due===undefined) t.due=""; if(t.cost===undefined) t.cost=0; }));
  delete p.blockers; // remove legacy blockers
  return p;
}
function loadLocal(){
  try{ const d=localStorage.getItem(STORAGE_KEY); return d?migrateData(JSON.parse(d)):JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  catch(e){ return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function saveLocal(d){ localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); }
function saveData(d){
  saveLocal(d);
  if(!sb) return;
  clearTimeout(saveTimeout);
  syncStatus="saving"; updateSyncDot();
  saveTimeout=setTimeout(async()=>{
    try{ const{error}=await sb.from("planner").upsert({id:1,data:d},{onConflict:'id',ignoreDuplicates:false}); if(error)throw error; syncStatus="online"; }
    catch(e){ console.error("Sync:",e); syncStatus="error"; }
    updateSyncDot();
  },400);
}
async function loadRemote(){
  if(!sb){syncStatus="offline";return null;}
  try{
    const{data,error}=await sb.from("planner").select("data").eq("id",1).single();
    if(error)throw error;
    syncStatus="online";
    // If Supabase has real data (with stages), return it
    if(data?.data?.stages) return migrateData(data.data);
    // If Supabase row exists but data is empty ({}), seed it with local data
    console.log("[Sync] Remote row is empty, seeding with local data");
    await sb.from("planner").update({data:DATA}).eq("id",1);
    return null;
  }catch(e){console.error("Sync load:",e);syncStatus="error";return null;}
}
function updateSyncDot(){
  const el=document.getElementById("sync-dot");
  if(el) el.className=`sync-dot ${syncStatus}`;
  const lbl=document.getElementById("sync-label");
  if(lbl) lbl.textContent={online:"Sincronizado",offline:"Sin conexión",saving:"Guardando...",error:"Error de sync"}[syncStatus];
}
async function forceSync(){
  syncStatus="saving"; updateSyncDot();
  const remote=await loadRemote();
  if(remote){ DATA=remote; saveLocal(DATA); openStages=new Set(DATA.stages.map(s=>s.id)); render(); }
  updateSyncDot();
}

// ═══ Helpers ═══
function stats(){
  let total=0,done=0,alta=0,altaDone=0,totalCost=0;
  DATA.stages.forEach(s=>s.tasks.forEach(t=>{ total++; if(t.done)done++; if(t.pri==="alta"){alta++;if(t.done)altaDone++;} totalCost+=(t.cost||0); }));
  return{total,done,pct:total?Math.round(done/total*100):0,alta,altaDone,pending:total-done,totalCost};
}
function fmtMoney(n){ if(!n)return""; return"$"+n.toLocaleString("es-AR"); }
function filteredTasks(tasks){
  let l=tasks;
  if(filter==="pendientes")l=l.filter(t=>!t.done);
  if(filter==="completadas")l=l.filter(t=>t.done);
  if(searchQuery)l=l.filter(t=>t.name.toLowerCase().includes(searchQuery.toLowerCase())||(t.note||"").toLowerCase().includes(searchQuery.toLowerCase()));
  return l;
}
function dueStatus(due){
  if(!due)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(due+"T00:00:00");d.setHours(0,0,0,0);
  const diff=Math.ceil((d-today)/864e5);
  return diff<0?"overdue":diff<=7?"soon":"ok";
}
function fmtDate(due){
  if(!due)return"";
  const d=new Date(due+"T00:00:00");
  const m=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return`${d.getDate()} ${m[d.getMonth()]}`;
}
function todayStr(){
  const d=new Date();
  const dias=["dom","lun","mar","mié","jue","vie","sáb"];
  const meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  return`${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]}`;
}
function stageStats(s){ const done=s.tasks.filter(t=>t.done).length,total=s.tasks.length; return{done,total,pct:total?Math.round(done/total*100):0}; }

// ═══ Actions ═══
function toggleTask(stageId,taskId){
  const stage=DATA.stages.find(s=>s.id===stageId);
  const task=stage?.tasks.find(t=>t.id===taskId);
  if(!task)return;
  task.done=!task.done;
  saveData(DATA); render();
}
function toggleStage(id){
  if(openStages.has(id))openStages.delete(id);else openStages.add(id);
  render();
}
function scrollToStage(id){
  if(!openStages.has(id))openStages.add(id);
  render();
  setTimeout(()=>document.getElementById("stage-"+id)?.scrollIntoView({behavior:"smooth",block:"start"}),50);
}
function setFilter(f){filter=f;render();}
function setSearch(q){searchQuery=q;render();}
function toggleSearch(){
  searchOpen=!searchOpen;

  render();
}

      ${icon('reset',18)} Resetear todo
    </button>
  </div>`;
  document.body.appendChild(el);
}

function toggleAllStages(){
  if(openStages.size>0)openStages.clear();
  else DATA.stages.forEach(s=>openStages.add(s.id));
  render();
}

function resetData(){
  customConfirm("Resetear todo","¿Volver a los datos iniciales? Se pierden todos los cambios.",()=>{
    DATA=JSON.parse(JSON.stringify(DEFAULT_DATA));
    saveData(DATA); render();
  },"Resetear");
}

function exportData(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;
  a.download=`gf-plan-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);
}

// ═══ Task Modal (bottom sheet) ═══
function editTask(stageId,taskId){
  const stage=DATA.stages.find(s=>s.id===stageId);
  const task=stage?.tasks.find(t=>t.id===taskId);
  if(task){editingTask={stageId,task:{...task}};renderModal();}
}

function renderModal(){
  document.getElementById("modal-root")?.remove();
  if(!editingTask&&!addingTo)return;
  const isEdit=!!editingTask;
  const task=isEdit?editingTask.task:{name:"",pri:"media",note:"",done:false,due:"",cost:0};
  const el=document.createElement("div");
  el.id="modal-root";
  el.innerHTML=`
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal-sheet">
    <div class="handle"></div>
    <div class="sheet-title">${isEdit?"Editar":"Nueva"} tarea</div>
    <div class="sheet-grid">
      <div>
        <input id="m-name" type="text" value="${task.name.replace(/"/g,'&quot;')}" placeholder="Nombre de la tarea">
      </div>
      <div class="sheet-row3">
        <div>
          <label>Prioridad</label>
          <select id="m-pri">
            <option value="alta" ${task.pri==="alta"?"selected":""}>🔴 Alta</option>
            <option value="media" ${task.pri==="media"?"selected":""}>🟡 Media</option>
            <option value="baja" ${task.pri==="baja"?"selected":""}>⚪ Baja</option>
          </select>
        </div>
        <div>
          <label>Fecha</label>
          <input id="m-due" type="date" value="${task.due||''}">
        </div>
        <div>
          <label>Gasto $</label>
          <input id="m-cost" type="number" inputmode="numeric" min="0" step="1000" value="${task.cost||''}" placeholder="0">
        </div>
      </div>
      <div>
        <textarea id="m-note" placeholder="Notas (opcional)">${task.note||""}</textarea>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" onclick="closeModal()">✕</button>
      ${isEdit?`<button class="btn btn-danger" onclick="deleteFromModal()">Eliminar</button>`:''}
      <button class="btn btn-olive" onclick="saveModal()">Guardar</button>
    </div>
  </div>`;
  document.body.appendChild(el);
  document.getElementById("m-name").focus();
}

function closeModal(){
  editingTask=null;addingTo=null;
  document.getElementById("modal-root")?.remove();
}

function saveModal(){
  const name=document.getElementById("m-name").value.trim();
  if(!name)return;
  const pri=document.getElementById("m-pri").value;
  const note=document.getElementById("m-note").value.trim();
  const due=document.getElementById("m-due").value||"";
  const cost=parseInt(document.getElementById("m-cost").value)||0;
  if(editingTask){
    const stage=DATA.stages.find(s=>s.id===editingTask.stageId);
    const task=stage?.tasks.find(t=>t.id===editingTask.task.id);
    if(task){task.name=name;task.pri=pri;task.note=note;task.due=due;task.cost=cost;}
  }else if(addingTo){
    const stage=DATA.stages.find(s=>s.id===addingTo);
    if(stage)stage.tasks.push({id:Date.now(),name,pri,note,done:false,due,cost});
  }
  saveData(DATA);closeModal();render();
}

function deleteFromModal(){
  if(!editingTask)return;
  const name=editingTask.task.name;
  customConfirm("Eliminar tarea",`¿Eliminar "${name}"?`,()=>{
    const stage=DATA.stages.find(s=>s.id===editingTask.stageId);
    if(stage)stage.tasks=stage.tasks.filter(t=>t.id!==editingTask.task.id);
    saveData(DATA);closeModal();render();
  });
}

function deleteTask(stageId,taskId){
  const stage=DATA.stages.find(s=>s.id===stageId);
  const task=stage?.tasks.find(t=>t.id===taskId);
  if(!task)return;
  customConfirm("Eliminar tarea",`¿Eliminar "${task.name}"?`,()=>{
    stage.tasks=stage.tasks.filter(t=>t.id!==taskId);
    saveData(DATA);render();
  });
}

// ═══ Keyboard ═══
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){closeModal();closeStageMenu();if(menuOpen)toggleMenu();}
});

// ═══ Auto-sync ═══
document.addEventListener("visibilitychange",()=>{if(!document.hidden)forceSync();});

// ═══ Keyboard-aware modal ═══
if(window.visualViewport){
  window.visualViewport.addEventListener("resize",()=>{
    const sheet=document.querySelector(".modal-sheet");
    if(!sheet)return;
    const vvh=window.visualViewport.height;
    const wh=window.innerHeight;
    if(vvh<wh-100){
      // keyboard is open
      sheet.style.maxHeight=vvh-10+"px";
      sheet.style.bottom="0";
    } else {
      sheet.style.maxHeight="90vh";
    }
  });
}

// ═══ Init ═══
render();
(async()=>{
  const remote=await loadRemote();
  if(remote){
    DATA=remote;saveLocal(DATA);
    openStages=new Set(DATA.stages.map(s=>s.id));
    render();
    console.log("[Sync] Loaded remote data OK");
  } else {
    // NEVER push local data on init — only pull.
    // Pushing here would overwrite phone changes with stale/default notebook data.
    console.log("[Sync] No remote data or error, using local. Status:", syncStatus);
  }
  updateSyncDot();
})();
</script>
</body>
